name = "budget-passbook-ai"
main = "worker.js"
compatibility_date = "2025-01-01"

# Created by `wrangler kv namespace create RATE_LIMIT_KV` — paste the id it gives you below.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "08e50fe754d642b7810f776f1a88b148"

# Optional: restrict CORS to your actual hosted domain instead of "*".
# Set via `wrangler secret put ALLOWED_ORIGIN` or as a plain var below.
[vars]
ALLOWED_ORIGIN = "*"
# The OAuth Client ID from Google Cloud Console (see worker/GOOGLE-SIGNIN-SETUP.md).
# This is not secret — it's the same value embedded in index.html's frontend JS —
# so a plain var is fine here, no need for `wrangler secret`.
GOOGLE_CLIENT_ID = "REPLACE_WITH_YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"

# Secrets needed (set with `wrangler secret put <NAME>`, not written here):
#   ANTHROPIC_API_KEY           — your Anthropic API key
#   GOOGLE_SERVICE_ACCOUNT_JSON — the full JSON key file content, as one line,
#                                  from a Google Cloud service account with
#                                  Android Publisher API access (see worker/README.md)
